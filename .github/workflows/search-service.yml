name: Build and Push Search Service Image

# GITHUB_TOKEN needs packages: write to push to ghcr.io (GitHub Container Registry)
permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - '*'

jobs:
  check-config:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if build is enabled
        id: check
        env:
          BUILD_ENABLED_VAR: ${{ vars.SEARCH_SERVICE_BUILD_ENABLED }}
        run: |
          if [ -n "$BUILD_ENABLED_VAR" ]; then
            ENABLED="$BUILD_ENABLED_VAR"
            echo "Taking value from SEARCH_SERVICE_BUILD_ENABLED: $ENABLED"
          else
            ENABLED=$(cat .github/build-config.json | jq -r '.services.search_service')
            echo "Taking value from build-config.json: $ENABLED"
          fi
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          echo "Search Service build enabled: $ENABLED"

  build-and-push:
    needs: check-config
    if: needs.check-config.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # Required to upload SARIF files to Security tab
      actions: read           # Required for upload-sarif to process results
    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 11 and Maven
      - name: Set up JDK 11 and Maven
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      # Step 3: Set up Login to Docker registry
      - name: Registry Login
        uses: ./.github/actions/registry-login
        with:
          registry_provider: ${{ vars.REGISTRY_PROVIDER }}
          gcp_service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          registry_name: ${{ secrets.REGISTRY_NAME }}
          registry_url: ${{ secrets.REGISTRY_URL }}
          registry_username: ${{ secrets.REGISTRY_USERNAME }}
          registry_password: ${{ secrets.REGISTRY_PASSWORD }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Build the project
      - name: Build Search API Service
        run: |
          mvn clean install -DskipTests=true

      # Step 5: Package the project
      - name: Package Search API Service
        run: |
          cd search-api
          mvn play2:dist -pl search-service

      # Step 6: Build Docker image
      - name: Build Docker Image
        run: |
          IMAGE_NAME="search-api"
          IMAGE_TAG=$(echo "${{ github.ref_name }}_$(echo $GITHUB_SHA | cut -c1-7)" | tr '[:upper:]' '[:lower:]')
          docker build -f build/search-service/Dockerfile -t $REGISTRY_URL/${IMAGE_NAME}:${IMAGE_TAG} .

          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      # Step 6a: Scan the locally-built image, non-blocking, produce SARIF
      - name: Scan image for CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe
        with:
          image-ref: ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: CRITICAL
          exit-code: '0'

      # Step 6b: Always upload whatever was found, even if we're about to block the push
      - name: Upload CRITICAL findings to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      # Step 6c: Block the push if any CRITICAL vulnerability was found
      - name: Block push if CRITICAL found
        run: |
          COUNT=$(python3 -c "import json; d=json.load(open('trivy-results.sarif')); print(len(d['runs'][0].get('results', [])))")
          echo "CRITICAL findings: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "CRITICAL vulnerability found — blocking push."
            exit 1
          fi

      # Step 7: Push Docker Image
      - name: Push Docker Image
        id: push
        run: |
          docker push $REGISTRY_URL/${IMAGE_NAME}:${IMAGE_TAG}
          echo "Pushed Docker image: $REGISTRY_URL/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "image=$REGISTRY_URL/${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
